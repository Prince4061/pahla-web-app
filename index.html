<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator - Modern & Minimal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="display-screen">
                <input type="text" id="display" class="display" readonly value="0">
            </div>
            
            <div class="buttons-grid">
                <button class="btn btn-clear" id="clear">C</button>
                <button class="btn btn-advanced" id="sqrt">√</button>
                <button class="btn btn-advanced" id="square">x²</button>
                <button class="btn btn-advanced" id="cube">x³</button>

                <button class="btn btn-number" data-number="7">7</button>
                <button class="btn btn-number" data-number="8">8</button>
                <button class="btn btn-number" data-number="9">9</button>
                <button class="btn btn-operation" id="divide">÷</button>

                <button class="btn btn-number" data-number="4">4</button>
                <button class="btn btn-number" data-number="5">5</button>
                <button class="btn btn-number" data-number="6">6</button>
                <button class="btn btn-operation" id="multiply">×</button>

                <button class="btn btn-number" data-number="1">1</button>
                <button class="btn btn-number" data-number="2">2</button>
                <button class="btn btn-number" data-number="3">3</button>
                <button class="btn btn-operation" id="subtract">−</button>

                <button class="btn btn-number btn-zero" data-number="0">0</button>
                <button class="btn btn-decimal" id="decimal">.</button>
                <button class="btn btn-operation" id="add">+</button>
                <button class="btn btn-equals" id="equals">=</button>

                <button class="btn btn-advanced" id="reciprocal">1/x</button>
                <button class="btn btn-advanced" id="percent">%</button>
                <button class="btn btn-advanced" id="power">x^y</button>
                <button class="btn btn-advanced" id="factorial">n!</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
